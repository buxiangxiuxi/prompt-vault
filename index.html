<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sun和休息の词会 · 第一期</title>
  <style>
    :root {
      --bg: #faf8f5;
      --card-bg: #ffffff;
      --card-border: #e8dfd3;
      --text: #4a3f35;
      --accent: #c49a6c;
      --input-bg: #fefcf9;
      --input-border: #dbd0c0;
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #faf8f5;
      color: #4a3f35;
      min-height: 100vh;
      padding: 20px 12px;
      display: flex;
      justify-content: center;
    }
    .app { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 18px; }
    .header { text-align: center; }
    .header h1 { font-size: 1.8rem; color: #4a3a2e; }
    .admin-bar { text-align: right; margin-bottom: 8px; }
    .card {
      background: #fff; border: 1px solid #e8dfd3; border-radius: var(--radius);
      padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }
    .card h3 { font-size: 1rem; margin-bottom: 14px; color: #5c4a3a; }
    .flex-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .flex-col { flex: 1; min-width: 180px; }
    label { font-size: 0.8rem; font-weight: 500; color: #8b7a6b; display: block; margin-bottom: 4px; }
    input, textarea, select, button {
      padding: 10px 14px; background: #fefcf9; border: 1.5px solid #dbd0c0;
      border-radius: var(--radius-sm); font-size: 0.9rem; outline: none;
      width: 100%; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }
    .btn {
      padding: 10px 18px; background: #c49a6c; color: white; border: none;
      border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn-outline { background: transparent; border: 1.5px solid #dbd0c0; color: #4a3f35; }
    .btn-sm { font-size: 0.8rem; padding: 6px 12px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .tab {
      padding: 8px 16px; border-radius: 12px; border: 1.5px solid #dbd0c0;
      background: transparent; cursor: pointer; font-size: 0.85rem;
    }
    .tab.active { background: #c49a6c; color: white; border-color: #c49a6c; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .img-card {
      border-radius: 12px; overflow: hidden; border: 1px solid #e8dfd3; background: #fff;
      cursor: pointer; transition: 0.15s;
    }
    .img-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.05); }
    .img-wrap { aspect-ratio: 1/1; background: #f0e9df; display: flex; align-items: center; justify-content: center; position: relative; }
    .img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .img-number { position: absolute; top: 4px; left: 4px; background: rgba(196,154,108,0.85); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 8px; }
    .img-info { padding: 8px; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex;
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-content {
      background: white; border-radius: 18px; padding: 24px; width: 90%; max-width: 420px;
      max-height: 85vh; overflow-y: auto;
    }
    .modal img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 10px; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #fff; padding: 10px 20px; border-radius: 20px; box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      z-index: 200; font-size: 0.85rem;
    }
    .admin-only { display: none; }
    body.admin .admin-only { display: inline-flex; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="admin-bar">
      <button class="btn btn-outline btn-sm" id="loginBtn">🔒 管理员登录</button>
      <button class="btn btn-outline btn-sm admin-only" id="logoutBtn" style="display:none;">🔓 退出</button>
    </div>
    <h1>🌸 Sun和休息の词会 · 第一期</h1>
    <p id="modeHint">访客模式 · 实时同步</p>
  </div>

  <!-- 添加图片卡片（管理员可见） -->
  <div class="card admin-only" id="addCard">
    <h3>📥 存入新图片</h3>
    <div class="flex-row">
      <div class="flex-col">
        <label>🔗 图片URL</label>
        <input type="url" id="urlInput" placeholder="https://...">
      </div>
      <div class="flex-col">
        <label>📁 或上传文件</label>
        <input type="file" id="fileInput" accept="image/*" multiple style="padding:8px;">
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>📂 词库</label>
      <select id="categorySelect">
        <option value="rest">休息的词库</option>
        <option value="sun">Sun的词库</option>
        <option value="gift">赠词词库</option>
      </select>
    </div>
    <div style="margin-top:10px;">
      <label>💬 提示词</label>
      <textarea id="promptInput" placeholder="输入提示词（所有图片共用）"></textarea>
    </div>
    <button class="btn" id="addBtn" style="margin-top:12px; width:100%;">✨ 存入云端</button>
  </div>

  <!-- 图片库 -->
  <div class="card">
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="rest">🛋️ 休息的词库</button>
      <button class="tab" data-cat="sun">☀️ Sun的词库</button>
      <button class="tab" data-cat="gift">🎁 赠词词库</button>
    </div>
    <input type="text" id="searchInput" placeholder="🔍 搜索提示词..." style="margin-bottom:12px;">
    <p id="countInfo" style="font-size:0.8rem; color:#8b7a6b; margin-bottom:10px;">加载中...</p>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal" style="display:none;">
  <div class="modal-content">
    <img id="detailImg" src="" style="display:none;">
    <div id="detailPlaceholder" style="width:100%; height:180px; background:#f0e9df; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:3rem;">🖼️</div>
    <h3 id="detailNumber"></h3>
    <div style="background:#fdf9f4; padding:12px; border-radius:10px; margin:8px 0; white-space:pre-wrap;" id="detailPrompt"></div>
    <div class="flex-row" style="margin-top:12px;">
      <button class="btn" id="copyBtn">📋 复制</button>
      <button class="btn btn-outline admin-only" id="editBtn">✏️ 编辑</button>
      <button class="btn btn-outline" id="closeDetailBtn">关闭</button>
      <button class="btn btn-outline admin-only" id="deleteBtn" style="color:#c96b6b;">🗑️ 删除</button>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="editModal" style="display:none;">
  <div class="modal-content">
    <h3>✏️ 编辑信息</h3>
    <select id="editCategory" style="margin:10px 0;">
      <option value="rest">休息的词库</option>
      <option value="sun">Sun的词库</option>
      <option value="gift">赠词词库</option>
    </select>
    <textarea id="editPrompt" rows="3"></textarea>
    <div class="flex-row" style="margin-top:12px;">
      <button class="btn" id="saveEditBtn">💾 保存</button>
      <button class="btn btn-outline" id="cancelEditBtn">取消</button>
    </div>
  </div>
</div>

<script>
  // 配置
  const SUPABASE_URL = 'https://hgmzfxlaxifrrleargjt.supabase.co/rest/v1/images';
  const SUPABASE_ANON_KEY = 'sb_publishable_LuLPI2Y80_sVKH4We-XAkg__GuLCgXD';
  const ADMIN_PASSWORD = '5201314';

  let isAdmin = false;
  let currentCat = 'rest';
  let items = [];

  // 封装 fetch，自动处理认证头
  function supabaseFetch(path, options = {}) {
    const headers = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      ...options.headers,
    };
    if (isAdmin) {
      headers['x-admin-password'] = ADMIN_PASSWORD;
    }
    return fetch(`${SUPABASE_URL}${path}`, {
      ...options,
      headers,
    }).then(res => {
      if (!res.ok) throw new Error(res.statusText);
      return res;
    });
  }

  // 加载所有图片
  async function loadItems() {
    try {
      const res = await supabaseFetch('?order=created_at.desc');
      items = await res.json();
    } catch (e) {
      items = [];
      showToast('数据加载失败');
    }
    renderGrid();
  }

  // 获取当前分类过滤后的图片
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    return items.filter(item => {
      if (item.category !== currentCat) return false;
      if (!q) return true;
      return item.prompt.toLowerCase().includes(q);
    }).sort((a, b) => a.number - b.number);
  }

  function renderGrid() {
    const filtered = getFiltered();
    const catNames = { rest:'休息的词库', sun:'Sun的词库', gift:'赠词词库' };
    document.getElementById('countInfo').textContent = `${catNames[currentCat]} · 共 ${filtered.length} 张`;
    const grid = document.getElementById('grid');
    grid.innerHTML = filtered.map(item => `
      <div class="img-card" data-id="${item.id}" onclick="openDetail('${item.id}')">
        <div class="img-wrap">
          <img src="${escapeHtml(item.imagedata)}" onerror="this.style.display='none';">
          <span class="img-number">#${item.number}</span>
        </div>
        <div class="img-info">${escapeHtml(item.prompt.substring(0,20))}</div>
      </div>`).join('');
  }

  function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // 选项卡
  document.getElementById('tabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab')) {
      currentCat = e.target.dataset.cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('searchInput').value = '';
      renderGrid();
    }
  });

  document.getElementById('searchInput').addEventListener('input', renderGrid);

  // 管理员登录/退出
  document.getElementById('loginBtn').addEventListener('click', () => {
    const pwd = prompt('请输入管理员密码：');
    if (pwd === ADMIN_PASSWORD) {
      isAdmin = true;
      document.body.classList.add('admin');
      document.getElementById('modeHint').textContent = '管理员模式 · 云端同步';
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      showToast('已切换为管理员模式');
    } else if (pwd !== null) {
      alert('密码错误');
    }
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    isAdmin = false;
    document.body.classList.remove('admin');
    document.getElementById('modeHint').textContent = '访客模式 · 实时同步';
    document.getElementById('loginBtn').style.display = 'inline-flex';
    document.getElementById('logoutBtn').style.display = 'none';
    showToast('已退出管理');
  });

  // 图片压缩
  function compress(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          const max = 800;
          if (w > max) { h *= max/w; w = max; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // 添加图片
  document.getElementById('addBtn').addEventListener('click', async () => {
    if (!isAdmin) return alert('无权限');
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return alert('请输入提示词');
    const category = document.getElementById('categorySelect').value;
    const url = document.getElementById('urlInput').value.trim();
    const files = document.getElementById('fileInput').files;
    let imgs = [];

    if (url) {
      if (!url.startsWith('http') && !url.startsWith('data:')) return alert('URL格式不正确');
      imgs.push(url);
    }
    if (files.length) {
      for (let f of files) imgs.push(await compress(f));
    }
    if (!imgs.length) return alert('请提供图片');

    // 获取当前分类最大编号
    const maxRes = await supabaseFetch(`?category=eq.${category}&order=number.desc&limit=1`);
    const maxData = await maxRes.json();
    let next = (maxData[0]?.number || 0) + 1;

    const rows = imgs.map((img, i) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + '' + i,
      number: next + i,
      category,
      imagedata: img,
      prompt
    }));

    try {
      await supabaseFetch('', {
        method: 'POST',
        body: JSON.stringify(rows),
        headers: { 'Prefer': 'return=minimal' }
      });
      // 清空
      document.getElementById('urlInput').value = '';
      document.getElementById('fileInput').value = '';
      document.getElementById('promptInput').value = '';
      loadItems();
      showToast('✅ 已同步到云端');
    } catch (e) {
      showToast('保存失败：' + e.message);
    }
  });

  // 详情弹窗
  let currentId = null;
  window.openDetail = function(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    currentId = id;
    document.getElementById('detailImg').src = item.imagedata;
    document.getElementById('detailImg').style.display = 'block';
    document.getElementById('detailPlaceholder').style.display = 'none';
    document.getElementById('detailNumber').innerHTML = `📌 编号 #${item.number} <span style="background:#f0e5d8;padding:2px 6px;border-radius:8px;font-size:0.7rem;">${getCatName(item.category)}</span>`;
    document.getElementById('detailPrompt').textContent = item.prompt;
    document.getElementById('detailModal').style.display = 'flex';
  };
  function getCatName(c) { return {rest:'休息的词库', sun:'Sun的词库', gift:'赠词词库'}[c]; }

  document.getElementById('closeDetailBtn').addEventListener('click', () => {
    document.getElementById('detailModal').style.display = 'none';
  });
  document.getElementById('detailModal').addEventListener('click', e => {
    if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none';
  });

  // 复制
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('detailPrompt').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制'));
  });

  // 删除
  document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!isAdmin) return;
    if (!confirm('确认删除？')) return;
    await supabaseFetch(`?id=eq.${currentId}`, { method: 'DELETE' });
    document.getElementById('detailModal').style.display = 'none';
    loadItems();
    showToast('已删除');
  });

  // 编辑
  document.getElementById('editBtn').addEventListener('click', () => {
    const item = items.find(i => i.id === currentId);
    if (!item) return;
    document.getElementById('editCategory').value = item.category;
    document.getElementById('editPrompt').value = item.prompt;
    document.getElementById('editModal').style.display = 'flex';
  });
  document.getElementById('saveEditBtn').addEventListener('click', async () => {
    const newCat = document.getElementById('editCategory').value;
    const newPrompt = document.getElementById('editPrompt').value.trim();
    if (!newPrompt) return alert('提示词不能为空');
    await supabaseFetch(`?id=eq.${currentId}`, {
      method: 'PATCH',
      body: JSON.stringify({ category: newCat, prompt: newPrompt })
    });
    document.getElementById('editModal').style.display = 'none';
    loadItems();
    // 更新详情弹窗
    const item = items.find(i => i.id === currentId);
    if (item) {
      document.getElementById('detailNumber').innerHTML = `📌 编号 #${item.number} <span style="background:#f0e5d8;padding:2px 6px;border-radius:8px;font-size:0.7rem;">${getCatName(item.category)}</span>`;
      document.getElementById('detailPrompt').textContent = item.prompt;
    }
    showToast('✅ 修改已保存');
  });
  document.getElementById('cancelEditBtn').addEventListener('click', () => {
    document.getElementById('editModal').style.display = 'none';
  });

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }

  // 启动
  loadItems();
</script>
</body>
</html>
